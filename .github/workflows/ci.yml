name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint and type check
    runs-on: windows-latest

    env:
      PYTHONPATH: src
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Configure Git line endings
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Show tool versions
        run: |
          python --version
          python -m ruff --version

      - name: Isort check
        run: python -m isort . --check-only

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy

  unit:
    name: Unit tests
    runs-on: windows-latest
    needs: lint

    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
      KOE_HEADLESS: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Configure Git line endings
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,tagging-cpu]"

      - name: Pytest with coverage
        run: |
          python -m coverage run -m pytest -p no:cov
          python -m coverage report

  integration:
    name: Integration tests
    runs-on: windows-latest
    needs: lint

    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Configure Git line endings
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,tagging-cpu]"

      - name: Pytest integration
        run: python -m pytest -m "integration and not gpu" -p no:cov

  gui-smoke:
    name: GUI smoke tests
    runs-on: windows-latest
    needs: lint

    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Configure Git line endings
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,tagging-cpu]"

      - name: Pytest GUI smoke
        run: python -m pytest -m "gui or smoke" -p no:cov

  db-stress:
    name: DB stress tests
    runs-on: windows-latest
    needs: lint

    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Configure Git line endings
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,tagging-cpu]"

      - name: Pytest DB stress
        run: python -m pytest -m db_stress -p no:cov

  package-smoke:
    name: Package smoke
    runs-on: windows-latest
    needs:
      - unit
      - integration
      - gui-smoke
      - db-stress

    env:
      PYTHONPATH: src
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Configure Git line endings
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,tagging-cpu]"

      - name: Compile package
        run: python -m compileall -q src tools
