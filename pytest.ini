[pytest]
addopts = -m "not gui and not integration" --import-mode=importlib
markers =
    gui: tests that require PyQt6 or display
    integration: tests that hit pipeline/db end-to-end
    not_gui: headless tests safe to run without a display server
    slow: tests that are intentionally slower than the default unit suite
    gpu: tests that require CUDA or GPU-backed inference dependencies
    db_stress: tests that exercise SQLite locking, WAL, or large write paths
    smoke: lightweight startup or packaging smoke tests
testpaths = tests
